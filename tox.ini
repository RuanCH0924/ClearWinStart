[tox]
envlist = py38, py39, py310, py311, py312, lint, type
isolated_build = True
skip_missing_interpreters = True

[testenv]
description = Run tests with pytest
deps =
    pytest>=7.0
    pytest-cov>=4.0
    winshell>=0.6
    pywin32>=300
commands =
    pytest --cov=clear_win_start --cov-report=term-missing --cov-report=html tests/

[testenv:lint]
description = Run linting tools
deps =
    flake8>=6.0
    black>=23.0
    isort>=5.12
commands =
    flake8 clear_win_start tests --max-line-length=100 --extend-ignore=E203,W503
    black --check clear_win_start tests
    isort --check-only clear_win_start tests

[testenv:type]
description = Run type checking with mypy
deps =
    mypy>=1.0
commands =
    mypy clear_win_start --ignore-missing-imports

[testenv:format]
description = Format code
deps =
    black>=23.0
    isort>=5.12
commands =
    black clear_win_start tests
    isort clear_win_start tests

[flake8]
max-line-length = 100
extend-ignore = E203, W503
exclude =
    .git,
    .tox,
    .venv,
    venv,
    build,
    dist,
    *.egg-info

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --cov=clear_win_start --cov-report=term-missing
